<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Pagine</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #e8f5e9;
}

/* HEADER */
header {
  background-color: #2e7d32;
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
}

/* HAMBURGER */
.menu-btn {
  font-size: 25px;
  cursor: pointer;
  margin-right: 15px;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0;
  left: -300px;
  width: 300px;
  height: 100%;
  background-color: #388e3c;
  transition: 0.3s;
  z-index: 1000;
}

/* IFRAME MENU */
.sidebar iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* CONTENUTO */
.content {
  padding: 20px;
}

  .cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  display: block;
  background: #66bb6a;
  padding: 20px;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

.card:hover {
  background: #2e7d32;
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <h2>Il Mio Sito</h2>
</header>

<div id="sidebar" class="sidebar">
  
  <!-- Pulsante chiudi -->
  <div style="padding:10px; text-align:right;">
    <span style="font-size:25px; cursor:pointer; color:white;" onclick="toggleMenu()">❌</span>
  </div>

  <!-- Menu iframe -->
  <iframe src="menubar.html"></iframe>

</div>

<div class="content">
  <h1>Le mie pagine</h1>
  <p>Eccole:</p>

  <h2>🌐 GitHub Pages</h2>

<div class="cards">
  <a href="https://demenigeco.github.io/LucertolaOS/" class="card">🦎 LucertolaOS</a>
  <a href="https://demenigeco.github.io/dsapps/" class="card">💻 DomePrograms</a>
  <a href="https://demenigeco.github.io/mcOS/" class="card">🎮 mcOS</a>
  <a href="https://demenigeco.github.io/HelloOS/" class="card">👋 HelloOS</a>
</div>

<h2>🔗 Altri siti</h2>

<div class="cards">
  <a href="https://qrcd.it/domenico" class="card">🚀 I miei progetti</a>
  <a href="https://utiteam.wordpress.com/" class="card">UtiTeam</a>
  <a href="https://dromilang.wordpress.com" class="card">🤯 Dromi</a>
</div>

<script>
function toggleMenu() {
  let sidebar = document.getElementById("sidebar");
  
  if (sidebar.style.left === "0px") {
    sidebar.style.left = "-300px";
  } else {
    sidebar.style.left = "0px";
  }
}
</script>

</body>
</html>
