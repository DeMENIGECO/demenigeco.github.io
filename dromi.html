<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dromi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #e8f5e9;
}

/* HEADER */
header {
  background-color: #2e7d32;
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
}

.menu-btn {
  font-size: 25px;
  cursor: pointer;
  margin-right: 15px;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0;
  left: -300px;
  width: 300px;
  height: 100%;
  background-color: #388e3c;
  transition: 0.3s;
  z-index: 1000;
}

.sidebar iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* CONTENUTO */
.content {
  padding: 20px;
}

/* BOX MARKDOWN */
.note-box {
  background: #e3f2fd;
  border-left: 5px solid #2196f3;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
}

.tip-box {
  background: #c8e6c9;
  border-left: 5px solid #2e7d32;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
}

.warning-box {
  background: #fff3cd;
  border-left: 5px solid #ff9800;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
}

.caution-box {
  background: #ffcdd2;
  border-left: 5px solid #d32f2f;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
}

/* contenuto markdown */
#content {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h1, h2, h3 {
  color: #2e7d32;
}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <h2>Dromi</h2>
</header>

<div id="sidebar" class="sidebar">
  <div style="padding:10px; text-align:right;">
    <span style="font-size:25px; cursor:pointer; color:white;" onclick="toggleMenu()">❌</span>
  </div>
  <iframe src="menubar.html"></iframe>
</div>

<div class="content">
  <div id="content">Caricamento...</div>
</div>

<!-- MARKDOWN LIB -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
// Toggle menu
function toggleMenu() {
  let sidebar = document.getElementById("sidebar");
  sidebar.style.left = (sidebar.style.left === "0px") ? "-300px" : "0px";
}

// Funzione per convertire i blocchi GitHub
function convertGitHubBlocks(md) {
  const types = [
    {tag: "NOTE", className:"note-box", icon:"📝"},
    {tag: "TIP", className:"tip-box", icon:"💡"},
    {tag: "WARNING", className:"warning-box", icon:"⚠️"},
    {tag: "CAUTION", className:"caution-box", icon:"🚨"}
  ];

  types.forEach(t => {
    // regex che cattura:
    // eventuali spazi iniziali + > + [!TIP] + tutto il blocco di quote
    const regex = new RegExp(`(^\\s*> \\[!${t.tag}\\]\\s*\\n(?:\\s*>.*\\n?)+)`, "gm");
    md = md.replace(regex, m => {
      // togli il primo > [!TIP] e tutti i > iniziali di ogni riga
      let content = m.replace(new RegExp(`^\\s*> \\[!${t.tag}\\]\\s*\\n?`), "")
                     .replace(/^\s*> ?/gm, "");
      return `<div class="${t.className}">${t.icon} ${content}</div>`;
    });
  });

  return md;
}

// Carica markdown da GitHub e converte
fetch("https://raw.githubusercontent.com/DeMENIGECO/Dromi/refs/heads/main/.github/WELCOME.md")
  .then(r => r.text())
  .then(md => {
    md = convertGitHubBlocks(md);
    document.getElementById("content").innerHTML = marked.parse(md);
  })
  .catch(err => {
    document.getElementById("content").innerText = "Errore 😢";
    console.error(err);
  });
</script>

</body>
</html>
