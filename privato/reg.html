<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area Utente</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e8f5e9;
}

header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
}

nav {
  display: flex;
  justify-content: space-around;
  background: #66bb6a;
  padding: 10px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.container {
  padding: 20px;
}
</style>
</head>

<body>

<header>Area Utente</header>

<nav>
  <a href="?tab=home">Home</a>
  <a href="?tab=profilo">Profilo</a>
  <a href="?tab=altro">Altro</a>
</nav>

<div class="container" id="content"></div>

<script>
function getQuery() {
  const params = new URLSearchParams(window.location.search);
  return {
    token: params.get("token"),
    usercode: params.get("usercode"),
    tab: params.get("tab") || "home"
  };
}

function checkToken(token) {
  if (!token) return false;

  if (localStorage.getItem("used_" + token)) {
    return false; // già usato
  }

  localStorage.setItem("used_" + token, "yes");
  localStorage.setItem("session", token);
  return true;
}

function render(tab) {
  const content = document.getElementById("content");

  if (tab === "home") {
    content.innerHTML = "<h2>Home</h2><p>Benvenuto!</p>";
  } else if (tab === "profilo") {
    content.innerHTML = "<h2>Profilo</h2><p>I tuoi dati</p>";
  } else {
    content.innerHTML = "<h2>Altro</h2><p>Altre cose</p>";
  }
}

// MAIN
const { token, usercode, tab } = getQuery();

if (token) {
  if (!checkToken(token)) {
    alert("Token non valido!");
    window.location.href = "login.html";
  }
} else {
  if (!localStorage.getItem("session")) {
    window.location.href = "login.html";
  }
}

render(tab);
</script>

</body>
</html>
